name: Sync Zoho data

# Pulls fresh data from Zoho Inventory (Production Dashboard) and
# Zoho CRM (Visit Report). Writes JSON to public/data/ which is
# served by Next.js as static files at /data/*.
#
# A commit from this workflow triggers a Vercel redeploy automatically.

on:
  schedule:
    # 09:00 and 15:00 UTC = 11:00 and 17:00 SAST, Mon–Fri
    - cron: '0 9,15 * * 1-5'
  workflow_dispatch:
    inputs:
      month:
        description: 'Inventory backfill month (YYYY-MM). Leave empty for current month.'
        required: false
        default: ''
      crm_month:
        description: 'CRM backfill month (YYYY-MM). Leave empty for current month.'
        required: false
        default: ''
      crm_all_months:
        description: 'Set to "true" to fetch all CRM records and write every month at once.'
        required: false
        default: 'false'
      skip_orders:
        description: 'Set to "true" to skip the Orders Process fetch.'
        required: false
        default: 'false'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Zoho Inventory data
        env:
          ZOHO_CLIENT_ID:     ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
          ZOHO_ORG_ID:        ${{ secrets.ZOHO_ORG_ID }}
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            python scripts/fetch_zoho.py --month "${{ github.event.inputs.month }}"
          else
            python scripts/fetch_zoho.py
          fi

      - name: Fetch Zoho CRM data
        env:
          ZOHO_CRM_CLIENT_ID:     ${{ secrets.ZOHO_CRM_CLIENT_ID }}
          ZOHO_CRM_CLIENT_SECRET: ${{ secrets.ZOHO_CRM_CLIENT_SECRET }}
          ZOHO_CRM_REFRESH_TOKEN: ${{ secrets.ZOHO_CRM_REFRESH_TOKEN }}
        run: |
          if [ -z "$ZOHO_CRM_CLIENT_ID" ]; then
            echo "ZOHO_CRM_CLIENT_ID secret not set — skipping CRM sync (add secrets to enable)"
            exit 0
          fi
          if [ "${{ github.event.inputs.crm_all_months }}" = "true" ]; then
            python scripts/fetch_zoho_crm.py --all-months
          elif [ -n "${{ github.event.inputs.crm_month }}" ]; then
            python scripts/fetch_zoho_crm.py --month "${{ github.event.inputs.crm_month }}"
          else
            python scripts/fetch_zoho_crm.py
          fi

      - name: Fetch Zoho CRM Orders data
        env:
          ZOHO_CRM_CLIENT_ID:     ${{ secrets.ZOHO_CRM_CLIENT_ID }}
          ZOHO_CRM_CLIENT_SECRET: ${{ secrets.ZOHO_CRM_CLIENT_SECRET }}
          ZOHO_CRM_REFRESH_TOKEN: ${{ secrets.ZOHO_CRM_REFRESH_TOKEN }}
        run: |
          if [ -z "$ZOHO_CRM_CLIENT_ID" ]; then
            echo "ZOHO_CRM_CLIENT_ID secret not set — skipping Orders sync"
            exit 0
          fi
          if [ "${{ github.event.inputs.skip_orders }}" = "true" ]; then
            echo "skip_orders=true — skipping Orders sync"
            exit 0
          fi
          python scripts/fetch_zoho_crm_orders.py

      - name: Fetch Stock vs Orders data
        env:
          ZOHO_CLIENT_ID:     ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
          ZOHO_ORG_ID:        ${{ secrets.ZOHO_ORG_ID }}
        run: python scripts/fetch_zoho_stock_orders.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync Zoho data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
